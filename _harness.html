<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" type="text/css" href="css/slides.css">
<link rel="stylesheet" type="text/css" href="css/signaling-scenarios.css">
<style>
  html,body{margin:0;background:#888;}
  #frame{position:absolute;left:20px;top:20px;width:960px;height:540px;
         outline:2px solid red;overflow:hidden;background:#fff;}
  /* simulate the footer band 60px below the stage to check safe space */
  #footerband{position:absolute;left:20px;top:560px;width:960px;height:40px;background:#1c1c1c;}
</style>
</head>
<body>
<div id="frame"></div>
<div id="footerband"></div>
<script src="js/lib/helpers.js"></script>
<script src="js/sims/SignalingWorld.js"></script>
<script src="js/sims/SignalingScenario.js"></script>
<script>
window._add = function(o){ document.getElementById('frame').appendChild(o.dom); };
window._remove = function(){};
var params = new URLSearchParams(location.search);
var which = params.get('which') || 'us';
function mount(o){ document.getElementById('frame').appendChild(o.dom); }

if(which === 'rolechoice'){ mount(new SignalingRoleChoice({id:'r',x:0,y:0,width:960,height:540})); }
if(which === 'signalchoice'){ window.signalingRole='China'; mount(new SignalingSignalSelection({id:'s',x:0,y:0,width:960,height:540})); }
if(which === 'china'){ window.signalingRole='China'; window.signalingSelectedSignal='T'; mount(new SignalingRoleGame({id:'g',x:0,y:0,width:960,height:540})); }
if(which === 'us'){
  window.signalingRole='US'; window.signalingSelectedSignal=params.get('sig')||'E';
  var g=new SignalingRoleGame({id:'g',x:0,y:0,width:960,height:540}); mount(g);
  if((params.get('sig')||'E')==='K'){
    var max=params.get('steps')==null?99:parseInt(params.get('steps'),10), done=0;
    var t=setInterval(function(){ var b=document.querySelector('.role-oversight-button'); if(b&&done<max){b.click();done++;}else{clearInterval(t);} },250);
  }
}
if(which === 'vietnam'){
  if(window.SignalingWorld){
    SignalingWorld.state.lastRun={signal:'K',signalReal:'Provider Oversight',response:'A',usType:'H',eq:{key:'separating'},costKey:'medium'};
    var sc=parseInt(params.get('scene')||'2',10);
    SignalingWorld.state.vietnamLevers = sc>=2 ? {0:true,3:true} : {};
  }
  mount(new SignalingVietnam({id:'v',scene:parseInt(params.get('scene')||'2',10),x:0,y:0,width:960,height:540}));
}
</script>
</body>
</html>
